<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anima LoRA Web UI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Anima LoRA</h1>
        <nav>
            <button class="tab-btn active" data-tab="config">配置</button>
            <button class="tab-btn" data-tab="training">训练</button>
        </nav>
        <div id="status-indicator">
            <span class="dot idle"></span>
            <span id="status-text">空闲</span>
        </div>
    </header>

    <main>
        <!-- 配置 Tab：左 2/3 表单 + 右 1/3 TOML 编辑 -->
        <section id="tab-config" class="tab-content active">
            <div class="config-toolbar">
                <label>方法:
                    <select id="method-select"></select>
                </label>
                <label>变体:
                    <select id="variant-select"></select>
                </label>
                <label>预设:
                    <select id="preset-select"></select>
                </label>
                <button id="btn-load-config" class="btn">刷新</button>
                <button id="btn-start-from-config" class="btn btn-primary">开始训练</button>
            </div>
            <div id="choice-guide" class="choice-guide" aria-label="配置选择说明"></div>
            <div class="config-split">
                <!-- 左侧：表单式配置 -->
                <div class="config-left">
                    <div id="config-form"></div>
                </div>
                <!-- 右侧：TOML 直接编辑 -->
                <div class="config-right">
                    <div class="toml-header">
                        <div class="toml-current-file">
                            <span>文件:</span>
                            <strong id="toml-current-file">-</strong>
                            <select id="toml-file-select" hidden></select>
                        </div>
                        <span id="toml-lock-badge" class="toml-lock-badge" hidden>锁定只读</span>
                        <div class="toml-file-actions" aria-label="TOML 文件操作">
                            <input id="toml-import-input" type="file" accept=".toml,.txt,text/plain" hidden>
                            <button id="btn-apply-toml" class="btn btn-small" type="button">应用到表单</button>
                            <button id="btn-import-toml" class="btn btn-small" type="button">导入</button>
                            <button id="btn-export-toml" class="btn btn-small" type="button">导出</button>
                            <button id="btn-save-as-toml" class="btn btn-small" type="button">另存为</button>
                            <button id="btn-reload-toml" class="btn btn-small" type="button">重载</button>
                            <button id="btn-save-toml" class="btn btn-small btn-primary" type="button">保存</button>
                        </div>
                        <span id="toml-status"></span>
                    </div>
                    <div class="toml-manager">
                        <aside id="toml-file-groups" class="toml-file-groups" aria-label="配置文件分组"></aside>
                        <textarea id="toml-editor" spellcheck="false"></textarea>
                    </div>
                </div>
            </div>
        </section>

        <!-- 训练监控 Tab -->
        <section id="tab-training" class="tab-content">
            <div class="training-toolbar">
                <div class="training-info">
                    <span id="train-variant">-</span> /
                    <span id="train-preset">-</span>
                </div>
                <button id="btn-stop-training" class="btn btn-danger" disabled>停止训练</button>
            </div>
            <div class="training-panels">
                <div class="panel progress-panel">
                    <h3>进度</h3>
                    <div class="progress-bar-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                    <div id="progress-text">-</div>
                </div>
                <div class="panel metrics-panel">
                    <h3>实时指标</h3>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <span class="metric-label">Loss</span>
                            <span id="metric-loss" class="metric-value">-</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">学习率</span>
                            <span id="metric-lr" class="metric-value">-</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">步数</span>
                            <span id="metric-step" class="metric-value">-</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">速度</span>
                            <span id="metric-rate" class="metric-value">-</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">显存</span>
                            <span id="metric-vram" class="metric-value">-</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">GPU</span>
                            <span id="metric-gpu" class="metric-value">-</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">日志活动</span>
                            <span id="metric-log-age" class="metric-value">-</span>
                        </div>
                    </div>
                    <div id="training-health" class="training-health">等待训练状态...</div>
                </div>
                <div class="panel chart-panel">
                    <h3>Loss 曲线</h3>
                    <canvas id="loss-chart" width="600" height="200"></canvas>
                </div>
                <div class="panel log-panel">
                    <h3>
                        日志
                        <span id="log-status" class="log-status">等待连接</span>
                        <button id="btn-clear-log" class="btn btn-small">清空</button>
                    </h3>
                    <pre id="log-output"></pre>
                </div>
            </div>
        </section>
    </main>

    <dialog id="preflight-dialog" class="preflight-dialog">
        <form method="dialog">
            <div class="preflight-header">
                <h2>训练前预检测</h2>
                <button class="btn btn-small" value="close">关闭</button>
            </div>
            <div id="preflight-summary" class="preflight-summary"></div>
            <div id="preflight-results" class="preflight-results"></div>
            <div class="preflight-actions">
                <button id="btn-preflight-cancel" class="btn" value="cancel">取消</button>
                <button id="btn-preflight-continue" class="btn btn-primary" value="continue">继续训练</button>
            </div>
        </form>
    </dialog>

    <script src="/static/chart.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
