# EasyControl 数据集蓝图。
#
# 这个文件只描述“图片和标注从哪里读、缓存写到哪里”，不是完整训练配置。
# EasyControl 的训练入口在 configs/gui-methods/easycontrol.toml 或
# configs/methods/easycontrol.toml。
#
# 源图片和同名 .txt 标注放在 easycontrol-dataset/。
# 预处理后的 VAE latent、文本编码缓存写入 post_image_dataset/easycontrol/，
# 这样源图目录会保持干净，不会混入训练缓存文件。

[general]
# 标注文件扩展名。默认读取和图片同名的 .txt 文件。
caption_extension = '.txt'

# 保留 caption 开头的 token 数，避免核心触发词被随机处理破坏。
keep_tokens = 3

[[datasets]]
# 训练分辨率、batch 和分桶设置。enable_bucket=true 会尽量保留原图宽高比。
resolution = 1024
batch_size = 1
enable_bucket = true

# 验证集比例和随机种子：固定种子可以让每次划分更稳定，便于对比实验。
validation_split = 0.025
validation_seed = 42

  [[datasets.subsets]]
  # EasyControl 专用源图目录。这里放原始图片和同名 .txt 标注。
  image_dir = 'easycontrol-dataset'

  # EasyControl 专用缓存目录。预处理/训练会在这里找 latent 和文本编码缓存。
  cache_dir = 'post_image_dataset/easycontrol'

  # 每张图在一个 epoch 内重复训练的次数。
  num_repeats = 1
