# gui-methods/lokr.toml — LoKr (Low-Rank Kronecker Product).
#
# LyCORIS-compatible LoKr via Kronecker product decomposition.
# Output is ComfyUI-compatible (lokr_w1/lokr_w2 keys, lycoris.kohya metadata).

network_dim = 32
network_alpha = 32

learning_rate = 1e-4
max_train_epochs = 10
# Normal adapter weight saves for comparing epochs in inference.
# These are useful outputs, but they do not carry optimizer/scheduler state.
save_every_n_epochs = 5
# Resumable training state save. This writes and overwrites the paired
# <output_name>-checkpoint.safetensors + <output_name>-checkpoint-state/.
# If training is interrupted, starting the same config again resumes from it.
checkpointing_epochs = 5

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_lokr = true
lokr_factor = 8

output_name = "anima_lokr"

blocks_to_swap = 0
use_cmmd = false

[variant]
family = "lokr"
label = "LoKr"
description = "LyCORIS-compatible Kronecker adapter saved as lokr_w1/lokr_w2."
order = 20
experimental = true
