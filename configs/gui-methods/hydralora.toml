# gui-methods/hydralora.toml — HydraLoRA + σ-conditional router with hard
# σ-bucket expert partition (default).
#
# Shared-A MoE shape: shared lora_down + per-expert lora_up heads, routed
# layer-locally. Adds a sinusoidal(σ)→E router bias plus
# ``specialize_experts_by_sigma_buckets = true`` so the expert pool is
# partitioned by timestep bucket (each σ-band routes only to its assigned
# experts). ``sigma_bucket_boundaries = [0.0, 0.5, 0.8, 1.0]`` places splits
# unevenly — more capacity in the late, low-noise refinement regime.

network_dim = 32
network_alpha = 32

learning_rate = 2e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho = true

use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0

use_moe_style = "shared_A"
route_per_layer = true
router_source = "sigma"
num_experts = 6
balance_loss_weight = 3e-7


router_targets = ".*(mlp\\.layer[12])$"

sigma_feature_dim = 16
per_bucket_balance_weight = 0.3
num_sigma_buckets = 3

specialize_experts_by_sigma_buckets = true
sigma_bucket_boundaries = [0.0, 0.5, 0.8, 1.0]

output_name = "anima_hydra"

blocks_to_swap = 0

use_cmmd = false

[variant]
family = "hydralora"
label = "HydraLoRA"
description = "Shared-A Hydra MoE with σ-bucket expert partition."
order = 10
