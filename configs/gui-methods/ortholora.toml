# gui-methods/ortholora.toml — OrthoLoRA-only baseline.
#
# Uses the PSOFT-style orthogonal parameterization without T-LoRA masking or
# ReFT intervention, so the WebUI's OrthoLoRA method family has a real trainable
# variant instead of an empty dropdown.

network_dim = 32
network_alpha = 32

learning_rate = 2e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho = true

output_name = "anima_ortholora"

blocks_to_swap = 0

use_cmmd = false

[variant]
family = "ortholora"
label = "OrthoLoRA"
description = "Plain LoRA with orthogonal parameterization, without T-LoRA or ReFT."
order = 10
