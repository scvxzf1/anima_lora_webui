# 系统训练预设集合。
#
# 这些预设会在 base.toml 和方法/变体配置之间生效：
#   base.toml → 当前预设 → 方法/变体 TOML
#
# 用法建议：
# - default：默认预设，不额外改变训练策略。
# - low_vram：低显存预设，启用梯度检查点和 Unsloth 显存卸载。
# - graft：把更多模型块放到 CPU/GPU 之间交换，进一步省显存但更慢。
# - half / quarter / tenth / debug：只抽取一部分数据做快速试跑。

[default]
# 默认预设：不交换模型块，适合作为最稳定的起点。
blocks_to_swap = 0

[low_vram]
# 低显存预设：降低显存峰值，代价是训练速度会变慢。
gradient_checkpointing = true
unsloth_offload_checkpointing = true

[graft]
# 极低显存/实验预设：交换更多 DiT 块，通常比 low_vram 更慢。
blocks_to_swap = 20

[half]
# 每轮只采样约 50% 数据，用于快速观察流程。
sample_ratio = 0.5

[quarter]
# 每轮只采样约 25% 数据，用于更快试跑。
sample_ratio = 0.25

[tenth]
# 每轮只采样约 10% 数据，只适合排错，不适合判断最终质量。
sample_ratio = 0.1

[debug]
# 调试预设：每轮约 0.1% 数据，主要用于验证配置/代码能不能跑通。
sample_ratio = 0.001
