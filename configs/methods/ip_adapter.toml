# IP-Adapter — decoupled image cross-attention.
#
# Adapter-only: DiT is frozen, training updates only the resampler and the
# per-block to_k_ip / to_v_ip projections (~few hundred MB of params total).
# Reference image and VAE target come from the SAME image (the dataset is
# self-paired). CFG dropout zeros image conditioning with probability
# `image_drop_p` so inference can do image-CFG independently of text-CFG.
#
# Source data: post_image_dataset/resized/  (shared with the LoRA pipeline)
# Caches:      post_image_dataset/lora/  ({stem}_anima_te.safetensors,
#              {stem}_{WxH}_anima.npz, {stem}_anima_pe.safetensors — also
#              shared with the LoRA pipeline; populate via `make preprocess`
#              + `make preprocess-pe` once and both pipelines reuse them).
# The dataset blueprint lives in configs/datasets/ip_adapter.toml.
#
# Feature source: defaults to PRE-CACHED PE features
# ({stem}_anima_pe.safetensors produced by `make preprocess-pe`). This lets
# cache_latents / cache_text_encoder_outputs all stay true and skips loading
# the vision encoder during training. Set `ip_features_cache_to_disk = false`
# and `cache_latents = false` to fall back to the original live-encoding path.
#
# 初学者导读：
# IP-Adapter 是项目内置的系统方法模块，不是普通 LoRA 变体。
# `network_module` 创建 resampler、图像 cross-attention 的 K/V 投影和可选
# PE-Core LoRA；`use_ip_adapter=true` 让训练循环把参考图特征送进网络。
# 基础 DiT 冻结，真正训练的是图像条件侧的 adapter 参数。

# 数据集蓝图：IP-Adapter 复用 LoRA 预处理后的图片和缓存，但通过单独
# dataset_config 写清楚读取方式。
dataset_config = "configs/datasets/ip_adapter.toml"

network_module = "networks.methods.ip_adapter"

# K = number of IP tokens (resampler output slots). 16 is a good default.
# 在这个方法里，network_dim 表示 resampler 输出多少个图像 token，
# 不是 LoRA rank。
network_dim = 16

# network_args 是图像编码和 resampler 的细节：
# - encoder/encoder_dim 选择 PE-Core 特征维度。
# - resampler_layers/heads 决定把图像 patch 聚合成 IP token 的小网络容量。
# - ip_scale 是图像条件强度。
# - gate_lr 单独加快每层 gate 打开速度。
network_args = [
    "encoder=pe",                # PE-Core-L14-336 (dynamic resolution; ~257 patch tokens)
    "encoder_dim=1024",          # PE-Core-L14-336 hidden dim
    "resampler_layers=2",
    "resampler_heads=8",
    "ip_scale=1.0",
    # Per-block gate (init 0) is what enforces "step 0 = baseline DiT".
    # Default: gate uses the global ``learning_rate`` below. Override here
    # if the gate isn't opening fast enough — empirically 8 epochs at
    # 1e-4 only reached abs_max ~0.004. A 10× higher gate LR is a reasonable
    # first try; watch ``ip_text_ratio/max`` for runaway.
    "gate_lr=1e-3",
    # Dataset-mean PE centroid, subtracted from every token before the
    # resampler. Targets the participation-ratio-6 manifold collapse measured
    # in bench/ip_adapter/analysis.md — gives the resampler the per-image
    # delta directly instead of forcing it to learn discrimination on top of
    # a strong shared-aesthetic background. Build the sidecar once via
    # `python scripts/compute_pe_centroid.py`. Comment out to disable (buffer
    # stays zero ⇒ no-op; equivalent to the pre-centroid behavior).
    
    # "ip_centroid_path=post_image_dataset/ip_adapter/anima_pe_centroid_pe.safetensors",

    # PE-Core LoRA (experimental prototype — see docs/proposal/ip-adapter_plan.md).
    # When enabled, the network owns PE-Core and trains LoRA on every
    # transformer.resblock (qkv + attn_out + mlp). FM gradient flows back
    # through PE so the encoder can adapt to the manga/anime distribution
    # (targets the PR=6.2 manifold collapse from the diagnostic memory note).
    # Forces ip_features_cache_to_disk=false because cached features can't
    # track a moving encoder.

    "pe_lora_enabled=true",
    "pe_lora_rank=16",
    "pe_lora_alpha=16",
    "pe_lora_layer_from=8",

    # "pe_lora_lr=1e-4",         # default = global learning_rate
    # "pe_lora_qkv=true",
    # "pe_lora_attn_out=true",
    # "pe_lora_mlp=true",

    # Trailing-layer count: -1 (default) ⇒ adapt every PE resblock. Positive N
    # adapts only the last N (PE-Core-L14-336 has 24 resblocks; =8 trains the
    # deepest 8 and freezes 0..15). Concentrates capacity on the high-level
    # semantic layers most likely to need manga/anime adaptation and roughly
    # cuts trainable PE-LoRA params proportionally.
]

output_name = "anima_ip_adapter"

logging_dir = "output/logs"
log_with = "tensorboard"

# 训练节奏：
# - save_every_n_epochs 保存普通 adapter 权重，用于推理和阶段对比。
# - checkpointing_epochs 保存可续训状态，包含 optimizer/scheduler。
# 普通保存文件能加载推理，但不是完整训练现场。
learning_rate = 1e-4
max_train_epochs = 8
save_every_n_epochs = 8
checkpointing_epochs = 8

# 诊断输出间隔；设置得很大表示默认几乎不跑额外诊断，避免拖慢训练。
ip_diagnostics_epochs = 999

# PE-LoRA owns the encoder and trains it live — pre-cached PE features can't
# track the moving LoRA, so feature caching is off. 
# ip_features_cache_to_disk = true

# CFG dropout for image conditioning (independent of text dropout).
# Read by train.py when use_ip_adapter is on.
# use_ip_adapter 是训练循环的数据注入开关；network_module 是网络创建入口。
# 两者都在，IP-Adapter 才能既创建参数又收到参考图条件。
use_ip_adapter = true
ip_image_drop_p = 0.05
caption_dropout_rate = 0.05
# gradient_accumulation_steps = 4

# DiT is frozen; resampler + KV proj + PE-LoRA + live PE encoder all sit on
# the GPU alongside the DiT. blocks_to_swap=12 leaves headroom for the live
# PE forward without disturbing the DiT-side memory budget.
# blocks_to_swap 把部分 DiT block 换出显存，为实时 PE 编码和 adapter 留空间。
blocks_to_swap = 12
# compile_mode = "full"
