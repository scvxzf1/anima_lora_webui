# LoRA family — method selection via toggle blocks.
#
# Default (uncommented) = LoRA + OrthoLoRA + T-LoRA + Hydra (σ-routed) + ReFT.
# Routing config is on the three-axis surface (plan2.md §three-axis-config):
#
#     use_moe_style    = False | "shared_A" | "independent_A"
#     route_per_layer  = true | false
#     router_source    = "none" | "input" | "sigma" | "fei"
#
# To switch routing modes:
#   - Plain LoRA stack (no MoE): set `use_moe_style = false` and drop every
#     `*router*` / `num_experts` / `balance_*` / `sigma_*` / `fei_*` key.
#   - FEI-on-Hydra (Phase 1, FeRA-style content-aware on the shared-A stack):
#     comment out the σ-router block and uncomment the FEI block near the
#     bottom of this file.
#   - Author-faithful FeRA (independent-A + global FEI router): use
#     `configs/gui-methods/fera.toml` instead — that variant lives on the
#     `lora-gui` Make target.
#
# Per-variant dim/alpha/lr/epochs are experiment drift, not calibrated
# defaults — tune freely.

network_alpha = 64
network_dim = 64

learning_rate = 1e-5
max_train_epochs = 24
save_every_n_epochs = 4
checkpointing_epochs = 4

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

logging_dir = "output/logs"
log_with = "tensorboard"

# -------------
# Ortho-lora

use_ortho = true

# -------------
# Timestep mask

use_timestep_mask = true
min_rank = 8
alpha_rank_scale = 1.0


# -------------
# hydralora (shared-A MoE, per-Linear router on σ features)

output_name = "anima_hydra"
use_moe_style = "shared_A"  # False | "shared_A" | "independent_A"

route_per_layer = true  # true | false


router_source = "sigma" # "sigma" | "fei"
num_experts = 12
balance_loss_weight = 2e-7 # seems lr * 1/100 is proper

balance_loss_warmup_ratio = 0.4
network_router_lr_scale = 10
router_targets = ".*(mlp\\.layer[12])$" # ".*\\.(qkv_proj|q_proj|kv_proj|output_proj|layer[12])$"

# Under router_source = "sigma"
sigma_feature_dim = 16
per_bucket_balance_weight = 0.3   # × balance_loss_weight, per-bucket term
num_sigma_buckets = 3
specialize_experts_by_sigma_buckets = true
sigma_bucket_boundaries = [0.0, 0.5, 0.8, 1.0]

# Under router_source = "fei"
# fei_feature_dim = 2          # raw simplex (e_low, e_high)
# fei_sigma_low_div = 4.0      # σ_low = min(H_lat, W_lat) / 4 — 2026-05-13 dataset sweep
# fera_num_bands = 2
# fera_fecl_weight = 0.0

# -------------
# reft

add_reft = true
reft_dim = 64
reft_alpha = 64
reft_layers = "last_8"


compile_mode = "full"
compile_inductor_mode = "reduce-overhead"


# ── Per-channel input pre-scaling (SmoothQuant-style, optional) ─────────
# Balances ∂L/∂lora_down column gradients when activations have DC-bias
# outlier channels (see archive/bench/channel_dominance_analysis.md). Calibration-
# only — no runtime overhead. Generate the stats file once:
#   python archive/bench/analyze_lora_input_channels.py \
#       --dump_channel_stats archive/bench/results/channel_stats.safetensors
# Then flip `per_channel_scaling` on. α=0.5 = SmoothQuant default (sqrt
# balance); α=1.0 fully flattens per-channel scale; α=0 disables.
# per_channel_scaling = true
# channel_stats_path = "archive/bench/results/channel_stats.safetensors"
# channel_scaling_alpha = 0.5

# -------------
# REPA (Yu et al., arxiv:2410.06940) — auxiliary alignment loss between a
# mid-block DiT hidden state and a cached PE-Core feature. Composes on top
# of any LoRA variant. Requires {stem}_anima_pe.safetensors sidecars from
# `make preprocess-pe` for every image (auto-enables ip_features_cache_to_disk).
# Hooks one DiT block; default 8 of 28 mirrors the paper's SiT-XL choice.

# use_repa = true
# repa_weight = 0.5
# repa_layer = 8
# repa_lr_scale = 1.0       # head LR = repa_lr_scale * unet_lr

# -------------
# hydralora-fei (FeRA-style content-aware routing — Phase 1 of plan2.md)
# Swaps the σ-keyed router for a 2-band FEI router (DoG-banded latent energy).
# A/B target: this block vs the default σ-router block above. To activate:
#   1. Replace `router_source = "sigma"` above with `router_source = "fei"`.
#   2. Comment out the σ-router block (sigma_feature_dim,
#      per_bucket_balance_weight, num_sigma_buckets,
#      specialize_experts_by_sigma_buckets, sigma_bucket_boundaries).
#      `router_targets` is shared across σ / FEI / Hydra — leave it as is.
#   3. Uncomment the FEI block below.
#   4. Change `output_name` to `"anima_hydra_fei"` so artifacts don't collide.
# The bench probe collapsed FeRA's 3 bands → 2 (mid was structurally sparse
# on flow-matching latents at every σ_mid we tried, confirmed on training
# latents 2026-05-13). σ_low scaling defaults to D/4 across aspect buckets
# from the dataset sweep — see [[project_fera_probe_2band_decision]].

# fei_feature_dim = 2          # raw simplex (e_low, e_high)
# fei_sigma_low_div = 4.0      # σ_low = min(H_lat, W_lat) / 4 — 2026-05-13 dataset sweep
# (layer scope is `router_targets` above — shared with Hydra / σ-router)
